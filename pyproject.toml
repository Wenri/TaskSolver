[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "tasksolver"
version = "0.0.1"
description = "Provider-agnostic VLM query flow: an Agent that dispatches to OpenAI / Anthropic / Gemini / vLLM / Claude Code CLI / local HuggingFace model backends."
readme = "README.md"
requires-python = ">=3.10"
# Core deps are the ones imported unconditionally (Agent + common/event/keychain)
# plus the lightweight API SDKs the provider adapters use. Versions are left
# unpinned so the consuming environment (e.g. a pixi workspace) owns resolution.
dependencies = [
    "loguru",
    "pillow",
    "numpy",
    "requests",
    "tqdm",
    "shortuuid",
    "pymongo",            # provides the `bson` module (standalone `bson` breaks on Python 3.14)
    "openai",             # gpt4v + vLLM adapters
    "anthropic",          # claude + kimi adapters
    "google-generativeai" # gemini adapter
]

[project.optional-dependencies]
# Local HuggingFace model adapters (qwen / intern / minicpm / phi / llama),
# which are imported lazily only when those model ids are selected. flash-attn
# is intentionally excluded: it builds from source and needs a CUDA toolkit.
local = [
    "torch",
    "torchvision",
    "transformers",
    "accelerate",
    "timm",
    "bitsandbytes",
    "decord",
    "qwen-vl-utils",
    "einops",
]

[tool.setuptools.packages.find]
include = ["tasksolver*"]

# --- pixi workspace + buildable package -----------------------------------
# Uses the `pixi-build` preview feature: rather than installing this project as
# an editable PyPI dependency, pixi builds it as a conda package via the
# pixi-build-python backend, and the workspace depends on it by path. The
# package's runtime deps are read from [project.dependencies] above. The heavy
# `local` extra stays out of the default environment (its ML stack may lag new
# Python releases); add a separate environment for it once those wheels
# support 3.14.
[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]
preview = ["pixi-build"]

[tool.pixi.dependencies]
python = "3.14.*"
tasksolver = { path = "." }

[tool.pixi.package]
name = "tasksolver"
version = "0.0.1"

[tool.pixi.package.build.backend]
name = "pixi-build-python"
version = "*"

# The python backend builds without build isolation, so the [build-system]
# requirements must be present in the package's host environment.
[tool.pixi.package.host-dependencies]
python = "3.14.*"
pip = "*"
setuptools = ">=61"
